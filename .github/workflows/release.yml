name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build AppImage in container
        run: |
          docker build -f packaging/Dockerfile.build -t firestorm-build .
          docker create --name fb firestorm-build
          docker cp fb:/src/dist ./dist
          docker rm fb

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          files: dist/*.AppImage
